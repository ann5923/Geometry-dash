<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Dash Ultra Pro</title>
    <style>
        :root { --p: #ff0055; --s: #00ffff; }
        body { margin: 0; overflow: hidden; background: #02020a; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; }
        
        #game-wrapper { position: relative; margin-top: 10px; border: 2px solid var(--p); box-shadow: 0 0 50px rgba(255,0,85,0.3); border-radius: 8px; overflow: hidden; }
        canvas { display: block; background: #020205; }

        /* UI GÓRNE */
        #ui-top { position: absolute; top: 10px; left: 20px; right: 20px; display: flex; justify-content: space-between; pointer-events: none; z-index: 5; font-weight: 900; letter-spacing: 1px; }
        .stat { text-shadow: 0 0 10px currentColor; }

        /* MENU GŁÓWNE */
        #menu { position: absolute; inset: 0; background: rgba(2, 2, 10, 0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; backdrop-filter: blur(15px); }
        h1 { font-size: 70px; margin: 0; text-shadow: 0 0 30px var(--p); letter-spacing: 5px; font-style: italic; }
        
        .main-nav { display: flex; align-items: center; gap: 40px; margin-top: 30px; }
        .nav-box { width: 90px; height: 90px; border: 2px solid var(--s); border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; background: rgba(0,255,255,0.05); }
        .nav-box:hover { background: var(--s); color: #000; box-shadow: 0 0 30px var(--s); transform: translateY(-5px); }
        .nav-box span { font-size: 11px; margin-top: 5px; font-weight: bold; }

        #playBtn { padding: 20px 80px; font-size: 45px; font-weight: 900; background: transparent; color: white; border: 4px solid white; cursor: pointer; transition: 0.4s; text-shadow: 0 0 20px #fff; box-shadow: 0 0 30px rgba(255,255,255,0.1); border-radius: 50px; }
        #playBtn:hover { transform: scale(1.05); background: #fff; color: #000; }

        /* MODALE */
        .modal { position: absolute; inset: 10px; background: #05050f; border: 2px solid var(--s); display: none; flex-direction: column; padding: 25px; z-index: 20; border-radius: 10px; box-shadow: 0 0 100px #000; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid rgba(0,255,255,0.2); padding-bottom: 10px; }
        .close-btn { cursor: pointer; font-size: 30px; color: var(--p); transition: 0.3s; }
        .close-btn:hover { transform: rotate(90deg); color: white; }
        
        .scroll-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 15px; overflow-y: auto; padding-right: 10px; }
        .item-card { padding: 15px; border: 1px solid #222; text-align: center; cursor: pointer; transition: 0.2s; border-radius: 8px; position: relative; }
        .item-card:hover { border-color: var(--s); background: rgba(0,255,255,0.1); }
        .item-card.locked { opacity: 0.3; filter: grayscale(1); cursor: not-allowed; }
        .item-card.active { border-color: white; box-shadow: 0 0 15px var(--s); background: rgba(255,255,255,0.05); }
        .item-card .tag { position: absolute; top: 5px; right: 5px; font-size: 9px; color: var(--s); }

        /* SKLEP ULEPSZEŃ */
        .upgrade-row { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #222; }
        .buy-btn { background: var(--s); color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 4px; }
        .buy-btn:disabled { background: #333; color: #666; }

    </style>
</head>
<body>

    <div id="game-wrapper">
        <div id="ui-top">
            <div class="stat" style="color: var(--s)">Wynik: <span id="score">0</span></div>
            <div class="stat" style="color: #ffcc00">Neon-Punkty: <span id="coins">0</span></div>
            <div class="stat" style="color: var(--p)" id="map-name">Poziom 1: Cyber</div>
        </div>

        <canvas id="gameCanvas" width="950" height="450"></canvas>

        <div id="menu">
            <h1>NEON DASH</h1>
            <div class="main-nav">
                <div class="nav-box" onclick="openModal('locker')">👕<span>SZAFKA</span></div>
                <button id="playBtn">GRAJ</button>
                <div class="nav-box" onclick="openModal('levels')">🗺️<span>MAPY</span></div>
            </div>
            <div style="margin-top: 30px; display: flex; gap: 20px;">
                <button onclick="openModal('shop')" style="background:none; border: 1px solid #444; color: #888; padding: 8px 20px; cursor: pointer; border-radius: 20px;">ULEPSZENIA (SKLEP)</button>
            </div>
        </div>

        <div id="locker" class="modal">
            <div class="modal-header"><h2>TWOJA SZAFKA (SKINY)</h2><span class="close-btn" onclick="closeModals()">×</span></div>
            <div id="skinGrid" class="scroll-grid"></div>
        </div>

        <div id="levels" class="modal">
            <div class="modal-header"><h2>WYBIERZ POZIOM / ŚWIAT</h2><span class="close-btn" onclick="closeModals()">×</span></div>
            <div id="levelGrid" class="scroll-grid"></div>
        </div>

        <div id="shop" class="modal">
            <div class="modal-header"><h2>SKLEP Z MOCAMI</h2><span class="close-btn" onclick="closeModals()">×</span></div>
            <div id="shopList">
                <div class="upgrade-row"><div><h3>Podwójny Skok</h3><p>Pozwala skoczyć drugi raz w powietrzu.</p></div><button class="buy-btn" onclick="buy('dj', 1000)" id="btn-dj">KUP (1000)</button></div>
                <div class="upgrade-row"><div><h3>Magnes Monet</h3><p>Przyciąga neon-punkty z daleka.</p></div><button class="buy-btn" onclick="buy('mag', 1500)" id="btn-mag">KUP (1500)</button></div>
                <div class="upgrade-row"><div><h3>Super Tarcza</h3><p>Przetrwasz jedno uderzenie w kolce.</p></div><button class="buy-btn" onclick="buy('sh', 2000)" id="btn-sh">KUP (2000)</button></div>
            </div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // --- DANE (20 POZIOMÓW I SKINÓW) ---
    const COLORS = ["#ff0055", "#00ffff", "#00ff66", "#bc00ff", "#ffaa00", "#ff00ea", "#33ff00", "#0066ff", "#ffffff", "#ff4444", "#8800ff", "#00ffcc", "#ffff00", "#ff8800", "#ff0088", "#0000ff", "#00ff00", "#cc00ff", "#00cccc", "#ff3333"];
    const LEVELS = Array.from({length: 20}, (_, i) => ({
        id: i,
        name: `Strefa ${i+1}`,
        p: COLORS[i % COLORS.length],
        s: COLORS[(i+1) % COLORS.length],
        unlocked: i === 0,
        req: i * 1500
    }));

    const SKINS = Array.from({length: 20}, (_, i) => ({
        id: i,
        name: `Skin Neon ${i+1}`,
        type: i, // Różne typy rysowania
        unlocked: i === 0
    }));

    let gameData = {
        coins: parseInt(localStorage.getItem('neon_c')) || 0,
        unlockedLevels: JSON.parse(localStorage.getItem('neon_l')) || [0],
        unlockedSkins: JSON.parse(localStorage.getItem('neon_s')) || [0],
        activeSkin: parseInt(localStorage.getItem('neon_as')) || 0,
        activeLevel: 0,
        upgrades: JSON.parse(localStorage.getItem('neon_u')) || { dj: false, mag: false, sh: false }
    };

    // --- SILNIK GRY ---
    let gameSpeed = 7;
    let score = 0;
    let isGameOver = true;
    let frame = 0;
    let obstacles = [];
    let particles = [];
    let trails = [];
    let coins = [];
    let platforms = [];

    const player = {
        x: 120, y: 300, size: 36, dy: 0, gravity: 0.8, jumpPower: -14,
        grounded: true, jumps: 0, angle: 0,
        update() {
            this.dy += this.gravity;
            this.y += this.dy;

            let onAnyPlatform = false;
            // Kolizja z podłogą
            if (this.y + this.size > canvas.height - 40) {
                this.y = canvas.height - 40 - this.size;
                this.dy = 0;
                this.grounded = true;
                this.jumps = 0;
                onAnyPlatform = true;
            }

            // Kolizja z platformami (blokami) - można na nich stać!
            platforms.forEach(p => {
                if (this.x + this.size > p.x && this.x < p.x + p.w) {
                    // Lądowanie na górze bloku
                    if (this.dy >= 0 && this.y + this.size <= p.y + 15 && this.y + this.size >= p.y - 10) {
                        this.y = p.y - this.size;
                        this.dy = 0;
                        this.grounded = true;
                        this.jumps = 0;
                        onAnyPlatform = true;
                    }
                    // Uderzenie w bok bloku = śmierć
                    else if (this.y + this.size > p.y + 5 && this.x + this.size > p.x + 5 && this.x < p.x + 15) {
                        gameOver();
                    }
                }
            });

            if (!onAnyPlatform) this.grounded = false;

            if (!this.grounded) {
                this.angle += 5;
                if (frame % 2 === 0) trails.push({x: this.x, y: this.y, a: 0.6, ang: this.angle});
            } else {
                this.angle = Math.round(this.angle/90)*90;
            }
            
            if (this.y > canvas.height + 100) gameOver();
        },
        draw() {
            ctx.save();
            ctx.translate(this.x + this.size/2, this.y + this.size/2);
            ctx.rotate(this.angle * Math.PI / 180);
            
            // Neonowy blask
            ctx.shadowBlur = 20;
            ctx.shadowColor = LEVELS[gameData.activeLevel].s;
            ctx.strokeStyle = LEVELS[gameData.activeLevel].s;
            ctx.lineWidth = 3;
            ctx.strokeRect(-this.size/2, -this.size/2, this.size, this.size);
            
            // Wnętrze skina
            ctx.fillStyle = "rgba(255,255,255,0.1)";
            ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
            
            ctx.fillStyle = LEVELS[gameData.activeLevel].s;
            const type = SKINS[gameData.activeSkin].id;
            // Rysowanie różnych detali w zależności od skina
            if (type % 4 === 0) ctx.fillRect(-4, -4, 8, 8);
            else if (type % 4 === 1) ctx.strokeRect(-10, -10, 20, 20);
            else if (type % 4 === 2) { ctx.beginPath(); ctx.arc(0,0, 6, 0, Math.PI*2); ctx.fill(); }
            else { ctx.rotate(Math.PI/4); ctx.fillRect(-8, -8, 16, 16); }

            ctx.restore();
        }
    };

    // --- OBIEKTY ---
    class Obstacle {
        constructor(type, x, y, w, h) {
            this.type = type; // 'spike' lub 'block'
            this.x = x; this.y = y; this.w = w; this.h = h;
        }
        update() { this.x -= gameSpeed; }
        draw() {
            ctx.shadowBlur = 15;
            ctx.shadowColor = LEVELS[gameData.activeLevel].p;
            ctx.fillStyle = LEVELS[gameData.activeLevel].p;
            if (this.type === 'spike') {
                ctx.beginPath();
                ctx.moveTo(this.x, this.y + this.h);
                ctx.lineTo(this.x + this.w/2, this.y);
                ctx.lineTo(this.x + this.w, this.y + this.h);
                ctx.fill();
            } else {
                ctx.fillRect(this.x, this.y, this.w, this.h);
                ctx.strokeStyle = "rgba(255,255,255,0.4)";
                ctx.strokeRect(this.x+2, this.y+2, this.w-4, this.h-4);
            }
        }
    }

    // --- MODALE ---
    function openModal(id) {
        document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
        document.getElementById(id).style.display = 'flex';
        if (id === 'locker') renderLocker();
        if (id === 'levels') renderLevels();
        updateShopButtons();
    }
    function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }

    function renderLocker() {
        const grid = document.getElementById('skinGrid'); grid.innerHTML = '';
        SKINS.forEach(s => {
            const unlocked = gameData.unlockedSkins.includes(s.id);
            const card = document.createElement('div');
            card.className = `item-card ${!unlocked ? 'locked' : ''} ${gameData.activeSkin === s.id ? 'active' : ''}`;
            card.innerHTML = `<h3>SKIN ${s.id+1}</h3><p>${unlocked ? 'Dostępny' : 'Zablokowany'}</p>`;
            if (unlocked) card.onclick = () => { gameData.activeSkin = s.id; save(); renderLocker(); };
            grid.appendChild(card);
        });
    }

    function renderLevels() {
        const grid = document.getElementById('levelGrid'); grid.innerHTML = '';
        LEVELS.forEach(l => {
            const unlocked = gameData.unlockedLevels.includes(l.id);
            const card = document.createElement('div');
            card.className = `item-card ${!unlocked ? 'locked' : ''} ${gameData.activeLevel === l.id ? 'active' : ''}`;
            card.style.borderColor = l.p;
            card.innerHTML = `<div class="tag">${l.req} pkt</div><h3>${l.name}</h3>`;
            if (unlocked) card.onclick = () => { gameData.activeLevel = l.id; document.getElementById('map-name').innerText = `Poziom ${l.id+1}: ${l.name}`; renderLevels(); };
            grid.appendChild(card);
        });
    }

    function buy(id, price) {
        if (gameData.coins >= price && !gameData.upgrades[id]) {
            gameData.coins -= price;
            gameData.upgrades[id] = true;
            save(); updateShopButtons();
        }
    }

    function updateShopButtons() {
        document.getElementById('btn-dj').innerText = gameData.upgrades.dj ? "ODBLOKOWANO" : "KUP (1000)";
        document.getElementById('btn-mag').innerText = gameData.upgrades.mag ? "ODBLOKOWANO" : "KUP (1500)";
        document.getElementById('btn-sh').innerText = gameData.upgrades.sh ? "ODBLOKOWANO" : "KUP (2000)";
        document.getElementById('coins').innerText = gameData.coins;
    }

    function save() {
        localStorage.setItem('neon_c', gameData.coins);
        localStorage.setItem('neon_l', JSON.stringify(gameData.unlockedLevels));
        localStorage.setItem('neon_s', JSON.stringify(gameData.unlockedSkins));
        localStorage.setItem('neon_as', gameData.activeSkin);
        localStorage.setItem('neon_u', JSON.stringify(gameData.upgrades));
    }

    // --- PĘTLA GRY ---
    function loop() {
        if (isGameOver) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Tło - siatka
        ctx.strokeStyle = LEVELS[gameData.activeLevel].p + "15";
        ctx.lineWidth = 1;
        for(let i=0; i<canvas.width; i+=40) { ctx.beginPath(); ctx.moveTo(i - (frame*2 % 40), 0); ctx.lineTo(i - (frame*2 % 40), canvas.height); ctx.stroke(); }

        // Podłoga
        ctx.fillStyle = "#050510";
        ctx.fillRect(0, canvas.height - 40, canvas.width, 40);
        ctx.strokeStyle = LEVELS[gameData.activeLevel].p;
        ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(0, canvas.height-40); ctx.lineTo(canvas.width, canvas.height-40); ctx.stroke();

        // Trails (Smugi)
        trails.forEach((t, i) => {
            t.x -= gameSpeed; t.a -= 0.03;
            if (t.a <= 0) trails.splice(i, 1);
            ctx.save();
            ctx.globalAlpha = t.a;
            ctx.translate(t.x + player.size/2, t.y + player.size/2);
            ctx.rotate(t.ang * Math.PI/180);
            ctx.strokeStyle = LEVELS[gameData.activeLevel].s;
            ctx.strokeRect(-player.size/2, -player.size/2, player.size, player.size);
            ctx.restore();
        });

        // Przeszkody i Platformy
        if (frame % 80 === 0) {
            let rand = Math.random();
            if (rand < 0.4) { // Kolec
                obstacles.push(new Obstacle('spike', canvas.width, canvas.height - 80, 40, 40));
            } else if (rand < 0.7) { // Blok / Schodek
                let h = 40 + Math.floor(Math.random()*2)*40;
                platforms.push(new Obstacle('block', canvas.width, canvas.height - 40 - h, 60, h));
            } else { // Seria schodków
                platforms.push(new Obstacle('block', canvas.width, canvas.height - 80, 50, 40));
                platforms.push(new Obstacle('block', canvas.width + 50, canvas.height - 120, 50, 80));
            }
        }

        [...obstacles, ...platforms].forEach((obs, i) => {
            obs.update(); obs.draw();
            if (obs.type === 'spike') {
                let m = 8;
                if (player.x + m < obs.x + obs.w && player.x + player.size - m > obs.x && player.y + m < obs.y + obs.h && player.y + player.size - m > obs.y) {
                    gameOver();
                }
            }
            if (obs.x + obs.w < -100) {
                if (obs.type === 'spike') obstacles.splice(obstacles.indexOf(obs), 1);
                else platforms.splice(platforms.indexOf(obs), 1);
            }
        });

        // Monety
        if (frame % 100 === 0) coins.push({x: canvas.width, y: canvas.height - 150 - Math.random()*100});
        coins.forEach((c, i) => {
            c.x -= gameSpeed;
            ctx.shadowBlur = 15; ctx.shadowColor = "#ffcc00";
            ctx.fillStyle = "#ffcc00"; ctx.beginPath(); ctx.arc(c.x, c.y, 8, 0, Math.PI*2); ctx.fill();
            if (Math.hypot(player.x - c.x, player.y - c.y) < 40) {
                gameData.coins += 10; coins.splice(i, 1);
                document.getElementById('coins').innerText = gameData.coins;
            }
            if (c.x < -20) coins.splice(i, 1);
        });

        player.update();
        player.draw();
        
        score++;
        document.getElementById('score').innerText = score;

        // Odblokowywanie map i skinów na podstawie wyniku
        LEVELS.forEach(l => {
            if (score >= l.req && !gameData.unlockedLevels.includes(l.id)) {
                gameData.unlockedLevels.push(l.id);
                gameData.unlockedSkins.push(l.id);
                save();
            }
        });

        frame++;
        requestAnimationFrame(loop);
    }

    function gameOver() {
        isGameOver = true;
        save();
        document.getElementById('menu').style.display = 'flex';
        document.querySelector('h1').innerText = "KONIEC GRY";
    }

    function startGame() {
        isGameOver = false;
        score = 0; frame = 0;
        obstacles = []; platforms = []; coins = []; trails = [];
        player.y = 300; player.dy = 0;
        document.getElementById('menu').style.display = 'none';
        loop();
    }

    document.getElementById('playBtn').onclick = startGame;
    
    // Sterowanie
    const handleJump = () => {
        if (!isGameOver) {
            const max = gameData.upgrades.dj ? 2 : 1;
            if (player.jumps < max) {
                player.dy = player.jumpPower;
                player.grounded = false;
                player.jumps++;
            }
        }
    };

    window.onkeydown = (e) => { if(e.code === 'Space') { e.preventDefault(); handleJump(); } };
    canvas.onmousedown = (e) => { e.preventDefault(); handleJump(); };

</script>
</body>
</html>
